name: Update

permissions:
  contents: read
  packages: read

on:
  schedule:
    - cron: "0 6/2 * * *"  # Daily at 06:00 UTC, a few hours after the upstream cache updates.
  workflow_dispatch:
    inputs:
      testing:
        # A testing run processes only a few items and reads/writes
        # derivatives/testing.jsonl, so the real cache is never touched.
        description: "Testing mode: process only a few items and write to derivatives/testing.jsonl instead of the real cache."
        required: false
        type: boolean
        default: false
      limit:
        description: "Complete run only: cap on the number of newly valid content IDs to process."
        required: false
        type: number
        default: 500

# Serialize all runs of this workflow, across every ref: an in-progress update is never
# cancelled, and a run triggered while one is executing waits in the queue. The Gate job
# below then skips the queued run once it starts, because the update it would perform has
# just been done; if the preceding run failed, the queued run proceeds as a fresh attempt.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets._GITHUB_API_KEY }}

jobs:
  Gate:
    permissions: {}
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Skip if an update already completed while this run was queued
        id: check
        env:
          GH_TOKEN: ${{ secrets._GITHUB_API_KEY }}
        run: |
          CREATED_AT=$(gh run view "${{ github.run_id }}" --repo "${{ github.repository }}" --json createdAt --jq '.createdAt')
          LAST_SUCCESS_AT=$(gh run list --repo "${{ github.repository }}" --workflow "${{ github.workflow }}" --status success --limit 1 --json updatedAt --jq '.[0].updatedAt // empty')

          # ISO 8601 UTC timestamps compare correctly as strings. A successful run that
          # finished after this run was triggered means this run spent its life queued
          # behind it and would only repeat the same update.
          if [ -n "${LAST_SUCCESS_AT}" ] && [ "${LAST_SUCCESS_AT}" \> "${CREATED_AT}" ]; then
            echo "An update succeeded at ${LAST_SUCCESS_AT}, after this run was triggered at ${CREATED_AT}; skipping the redundant run."
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          fi

  Update:
    needs: [ Gate ]
    if: ${{ needs.Gate.outputs.should-run == 'true' }}
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets._GITHUB_API_KEY }}
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install git-annex
        run: |
          sudo apt-get update
          sudo apt-get install -y git-annex

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets._GITHUB_API_KEY }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Run update with provenance
        env:
          REPO_URL: https://x-access-token:${{ secrets._GITHUB_API_KEY }}@github.com/${{ github.repository }}.git
          WORKSPACE: ${{ github.workspace }}
          # Empty for scheduled runs and "false" for plain manual runs (complete update);
          # only "true" when testing mode is explicitly selected on workflow_dispatch.
          TESTING: ${{ github.event.inputs.testing }}
          # Complete-run batch cap; the pipeline defaults it to 500 when unset (scheduled runs).
          LIMIT: ${{ github.event.inputs.limit }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGE: ghcr.io/dandi-cache/valid-nwb-file-to-number-of-groups:latest
        run: bash code/update_pipeline.sh

  NotifyOnFailure:
    runs-on: ubuntu-latest
    needs: [ Gate, Update ]
    if: ${{ always() && failure() }}
    permissions: {}
    steps:
      - uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CI Failure: DANDI Cache: valid-nwb-file-to-number-of-groups"
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: DANDI Cache <dandi-cache@users.noreply.github.com>
          body: "Please check the latest run of the DANDI Cache update: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
