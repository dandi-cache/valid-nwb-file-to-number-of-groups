name: Build and Upload Container

permissions:
  contents: read
  packages: read

on:
  push:
    branches: [ main ]
    paths:
      - "envs/pyproject.toml"
      - "containers/**"
      - ".github/workflows/build_and_upload_docker_image.yml"
  pull_request:
    paths:
      - "envs/pyproject.toml"
      - "containers/**"
      - ".github/workflows/build_and_upload_docker_image.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  BuildAndPush:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Skip authentication on pull requests: those only build the image to validate it.
      - name: Log in to GitHub Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets._GITHUB_API_KEY }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: containers/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/dandi-cache/valid-nwb-file-to-number-of-groups:latest
            ghcr.io/dandi-cache/valid-nwb-file-to-number-of-groups:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  NotifyOnFailure:
    runs-on: ubuntu-latest
    needs: [ BuildAndPush ]
    if: ${{ always() && failure() }}
    permissions: {}
    steps:
      - uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CI Failure: DANDI Cache: valid-nwb-file-to-number-of-groups container build"
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: DANDI Cache <dandi-cache@users.noreply.github.com>
          body: "Please check the latest container build of the DANDI Cache: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
